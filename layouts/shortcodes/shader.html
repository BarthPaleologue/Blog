<!-- A Hugo Shortcode that can embed a Shadertoy shader -->
{{ with .Get "id" }}
    <iframe
        src="//www.shadertoy.com/embed/{{ . }}"
        title="ShaderToy Shader"
        frameborder="0"
        marginwidth="0"
        marginheight="0"
        scrolling="no"
        style="aspect-ratio: 16 / 9;margin-bottom: 10px; margin-top: 10px; width: 100%;"
        allowfullscreen="true">
    </iframe>
{{ end }}
